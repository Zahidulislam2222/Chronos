name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── PHP Lint & Tests (chronos-bridge) ──────────────────────────
  php-tests:
    name: PHP Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, curl, zip
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: wordpress/wp-content/plugins/chronos-bridge
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPCS
        working-directory: wordpress/wp-content/plugins/chronos-bridge
        run: vendor/bin/phpcs --standard=phpcs.xml --report=summary --warning-severity=0

      - name: Run PHPUnit
        working-directory: wordpress/wp-content/plugins/chronos-bridge
        run: vendor/bin/phpunit --testdox

  # ── JS Lint, Build & Tests (chronos-blocks) ───────────────────
  blocks-tests:
    name: Blocks Build & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: wordpress/wp-content/plugins/chronos-blocks/package-lock.json

      - name: Install dependencies
        working-directory: wordpress/wp-content/plugins/chronos-blocks
        run: npm ci

      - name: Build blocks
        working-directory: wordpress/wp-content/plugins/chronos-blocks
        run: npm run build

      - name: Run Jest tests
        working-directory: wordpress/wp-content/plugins/chronos-blocks
        run: npm test

  # ── Frontend Build (React + Vite) ─────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  # ── Deploy to Production (cPanel API) ───────────────────────
  deploy:
    name: Deploy to Production
    needs: [php-tests, blocks-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm ci
          pip install requests

      - name: Build frontend
        env:
          VITE_API_URL: https://chronosbackend.healthcodeanalysis.com/graphql
        run: npm run build

      - name: Deploy backend plugins + frontend via cPanel API
        env:
          CPANEL_URL: ${{ secrets.CPANEL_URL }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: python scripts/ci-deploy.py

      - name: Verify deployment
        run: |
          echo "Verifying backend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://chronosbackend.healthcodeanalysis.com/wp-json/chronos/v1/" || echo "000")
          echo "Backend: HTTP $STATUS"
          echo ""
          echo "Verifying frontend..."
          FSTATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://chronos.healthcodeanalysis.com/" || echo "000")
          echo "Frontend: HTTP $FSTATUS"
