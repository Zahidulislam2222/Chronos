name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── PHP Lint & Tests (chronos-bridge) ──────────────────────────
  php-tests:
    name: PHP Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, curl, zip
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: wordpress/wp-content/plugins/chronos-bridge
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPCS
        working-directory: wordpress/wp-content/plugins/chronos-bridge
        run: vendor/bin/phpcs --standard=phpcs.xml --report=summary --warning-severity=0

      - name: Run PHPUnit
        working-directory: wordpress/wp-content/plugins/chronos-bridge
        run: vendor/bin/phpunit --testdox

  # ── JS Lint, Build & Tests (chronos-blocks) ───────────────────
  blocks-tests:
    name: Blocks Build & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: wordpress/wp-content/plugins/chronos-blocks/package-lock.json

      - name: Install dependencies
        working-directory: wordpress/wp-content/plugins/chronos-blocks
        run: npm ci

      - name: Build blocks
        working-directory: wordpress/wp-content/plugins/chronos-blocks
        run: npm run build

      - name: Run Jest tests
        working-directory: wordpress/wp-content/plugins/chronos-blocks
        run: npm test

  # ── Frontend Build (React + Vite) ─────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
