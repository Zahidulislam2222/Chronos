name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── PHP Lint & Tests (chronos-bridge) ──────────────────────────
  php-tests:
    name: PHP Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, curl, zip
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: wordpress/wp-content/plugins/chronos-bridge
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPCS
        working-directory: wordpress/wp-content/plugins/chronos-bridge
        run: vendor/bin/phpcs --standard=phpcs.xml --report=summary

      - name: Run PHPUnit
        working-directory: wordpress/wp-content/plugins/chronos-bridge
        run: vendor/bin/phpunit --testdox

  # ── JS Lint, Build & Tests (chronos-blocks) ───────────────────
  blocks-tests:
    name: Blocks Build & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: wordpress/wp-content/plugins/chronos-blocks/package-lock.json

      - name: Install dependencies
        working-directory: wordpress/wp-content/plugins/chronos-blocks
        run: npm ci

      - name: Build blocks
        working-directory: wordpress/wp-content/plugins/chronos-blocks
        run: npm run build

      - name: Run Jest tests
        working-directory: wordpress/wp-content/plugins/chronos-blocks
        run: npm test

  # ── Frontend Build (React + Vite) ─────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  # ── Deploy to cPanel (only on push to main, after tests) ──────
  deploy:
    name: Deploy to cPanel
    runs-on: ubuntu-latest
    needs: [php-tests, blocks-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Composer dependencies (production)
        working-directory: wordpress/wp-content/plugins/chronos-bridge
        run: |
          composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

      - name: Install and build blocks (production)
        working-directory: wordpress/wp-content/plugins/chronos-blocks
        run: |
          npm ci
          npm run build

      - name: Deploy chronos-bridge to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASS }}
          local-dir: wordpress/wp-content/plugins/chronos-bridge/
          server-dir: ${{ secrets.CPANEL_PLUGIN_PATH }}/chronos-bridge/
          exclude: |
            **/.git*
            **/node_modules/**
            **/tests/**
            **/.phpunit.cache/**
            **/phpunit.xml
            **/phpcs.xml

      - name: Deploy chronos-blocks to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASS }}
          local-dir: wordpress/wp-content/plugins/chronos-blocks/
          server-dir: ${{ secrets.CPANEL_PLUGIN_PATH }}/chronos-blocks/
          exclude: |
            **/.git*
            **/node_modules/**
            **/tests/**
            **/src/**
