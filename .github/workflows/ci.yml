name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── PHP Lint & Tests (chronos-bridge) ──────────────────────────
  php-tests:
    name: PHP Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, curl, zip
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: wordpress/wp-content/plugins/chronos-bridge
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPCS
        working-directory: wordpress/wp-content/plugins/chronos-bridge
        run: vendor/bin/phpcs --standard=phpcs.xml --report=summary --warning-severity=0

      - name: Run PHPUnit
        working-directory: wordpress/wp-content/plugins/chronos-bridge
        run: vendor/bin/phpunit --testdox

  # ── JS Lint, Build & Tests (chronos-blocks) ───────────────────
  blocks-tests:
    name: Blocks Build & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: wordpress/wp-content/plugins/chronos-blocks/package-lock.json

      - name: Install dependencies
        working-directory: wordpress/wp-content/plugins/chronos-blocks
        run: npm ci

      - name: Build blocks
        working-directory: wordpress/wp-content/plugins/chronos-blocks
        run: npm run build

      - name: Run Jest tests
        working-directory: wordpress/wp-content/plugins/chronos-blocks
        run: npm test

  # ── Frontend Build (React + Vite) ─────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  # ── Deploy ─────────────────────────────────────────────────────
  # Deployment is handled via cPanel Git Version Control (passwordless).
  #
  # How it works:
  #   1. cPanel pulls from this GitHub repo automatically on push
  #   2. No FTP passwords or SSH keys stored in GitHub Secrets
  #   3. Configure once in cPanel: Repositories > Create > paste repo URL
  #
  # Setup guide:
  #   - Log in to cPanel > Git Version Control
  #   - Create repository: https://github.com/Zahidulislam2222/Chronos.git
  #   - Deploy path: /home/mehzsolu/chronosbackend.healthcodeanalysis.com/
  #   - cPanel auto-deploys on push to main
  #
  # This is the recommended approach for shared hosting — no credentials
  # stored anywhere outside the hosting provider.
